<!-- Begin Body -->
<div class="container">
	<div class="row">
  			<div class="col-md-2" id="leftCol">

                <div id="picture" style="background-image: url(https://raw.githubusercontent.com/owensgl/owensgl.github.io/master/images/Greg_web.png)"></div>
                <p>{{site.description}}</p>
                <hr>
                <div id="social-icons">
                    <ul>
                        <li><a href="https://linkedin.com/in/{{ site.linkedin }}"><i class="fa fa-linkedin"></i></a></li>
                        <li><a href="http://github.com/{{ site.github }}"><i class="fa fa-github"></i></a></li>
                        <li><a href="https://scholar.google.ca/citations?user={{site.google_scholar}}"><i class="fa fa-google"></i></a></li>
                    </ul>
                </div>
                <hr>

                <div class="navigation">
                    <ul>
                    	<li><a href="https://owensgl.github.io">home</a></li>
                        {% for my_page in site.pages %}
                            {% if my_page.title %}
                            <li><a href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a></li>
                        {% endif %}
                        {% endfor %}
                        <li><a href="https://owensgl.github.io/Greg_Owens_CV_2016.pdf">cv</a></li>
                    </ul>
                </div>



								<hr>

								<p>{{site.footer}}<p>
								<p>Powered by Jekyll<p>

								<hr>

      		</div>

      		<div class="col-md-10 content">

            {{ content }}

      		</div>
  	</div>
</div>
